<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Para o Meu Amor</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #5c94fc; font-family: 'Arial', sans-serif; touch-action: manipulation; }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            z-index: 100; text-align: center; padding: 20px; box-sizing: border-box;
        }

        #tela-inicio { background-color: #5c94fc; color: white; display: flex; }
        #tela-desafio { background-color: rgba(0,0,0,0.95); color: white; display: none; }
        #tela-pedido { background-color: rgba(0,0,0,0.95); color: white; display: none; }
        #tela-celebracao { background: #ffb6c1 url('fogos.png') center/cover; background-blend-mode: screen; display: none; }

        #game-container {
            width: 100vw; height: 100vh; position: relative;
            background-image: url('fundo.png'); 
            background-size: auto 100%; background-repeat: repeat-x; background-position: 0 bottom;
            display: none; 
        }

        #chao { width: 100%; height: 15vh; background-color: #2e8b57; position: absolute; bottom: 0; border-top: 6px solid #1e5d3a; z-index: 2; }
        #player { width: 80px; height: 80px; background: url('player.png') no-repeat center/contain; position: absolute; bottom: 15vh; left: 40px; z-index: 5; }
        #princesa { width: 90px; height: 90px; background: url('princesa.png') no-repeat center/contain; position: absolute; bottom: 15vh; right: -150px; z-index: 5; }
        .obstaculo { width: 50px; height: 50px; background-color: #885418; border: 3px solid #000; position: absolute; bottom: 15vh; z-index: 3; }

        .foto-sucesso { width: 85%; max-width: 350px; border: 10px solid white; border-radius: 20px; margin-top: 20px; }
        .texto-carinhoso { font-style: italic; font-size: 18px; margin: 15px 0; color: #ffeb3b; line-height: 1.4; }
        .texto-gatinha { font-size: 36px; color: #ff0000; font-weight: bold; margin-top: 20px; text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff, 2px 2px 0 #000000; }

        .area-botoes { display: flex; gap: 20px; justify-content: center; align-items: center; margin-top: 20px; width: 100%; height: 100px; position: relative; }
        button { padding: 15px 30px; font-size: 22px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #000; }
        
        #btn-jogar { background-color: #4CAF50; color: white; font-size: 28px; }
        .btn-sim { background-color: #ff4757; color: white; }
        .btn-nao { background-color: #7f8c8d; color: white; transition: 0.1s; }
        
        /* Classe para o botão que foge no final */
        #btn-nao-foge { position: absolute; }
    </style>
</head>
<body onclick="pular()">

<div id="tela-inicio" class="overlay">
    <h1 style="font-size: 40px; margin-bottom: 30px;">Pronta para o desafio? ❤️</h1>
    <button id="btn-jogar" onclick="iniciarJogo(event)">JOGAR!</button>
</div>

<div id="game-container">
    <div id="chao"></div>
    <div id="player"></div>
    <div id="princesa"></div>
    <div class="obstaculo" style="left: 800px;"></div>
    <div class="obstaculo" style="left: 1400px;"></div>
    <div class="obstaculo" style="left: 2000px;"></div>
</div>

<div id="tela-desafio" class="overlay">
    <h2 style="font-size: 28px;">Neném, você chegou ao fim! ❤️</h2>
    <h1 style="font-size: 32px; margin-top: 20px;">Pronta para o próximo desafio?</h1>
    <div class="area-botoes">
        <button class="btn-sim" onclick="abrirPedido(event)">SIM!</button>
        <button class="btn-nao" onclick="alert('Ah, tem que clicar em sim! rs')">Não</button>
    </div>
</div>

<div id="tela-pedido" class="overlay">
    <p class="texto-carinhoso">
        Cada obstáculo que passei aqui foi só uma brincadeira perto da sorte que é ter você. <br>
        Você é a pessoa que eu quero ao meu lado em todas as fases da vida.
    </p>
    <h1 style="font-size: 32px;">Quer namorar comigo?</h1>
    <div class="area-botoes">
        <button class="btn-sim" onclick="aceitou(event)">SIM!</button>
        <button id="btn-nao-foge" class="btn-nao" onmouseover="fugir(event)" ontouchstart="fugir(event)">Não</button>
    </div>
</div>

<div id="tela-celebracao" class="overlay">
    <h1 style="color: white; font-size: 40px; text-shadow: 2px 2px #ff4757;">DISSE SIM! ❤️</h1>
    <img src="foto_final.png" class="foto-sucesso">
    <p class="texto-gatinha">Te amo Gatinha!</p>
</div>

<script>
    const player = document.getElementById('player');
    const gameContainer = document.getElementById('game-container');
    const princesa = document.getElementById('princesa');
    const btnNaoFoge = document.getElementById('btn-nao-foge');

    let playerY = 15;
    let isJumping = false;
    let velocityY = 0;
    let gamePos = 0;
    let gameActive = false;
    const finalDaFase = 2700;

    function iniciarJogo(event) {
        event.stopPropagation();
        document.getElementById('tela-inicio').style.display = 'none';
        gameContainer.style.display = 'block';
        gameActive = true;
        loop(); 
    }

    function pular() {
        if (!isJumping && gameActive) {
            isJumping = true;
            velocityY = 1.8;
        }
    }

    function loop() {
        if (gameActive) {
            if (isJumping) {
                velocityY -= 0.08;
                playerY += velocityY;
                if (playerY <= 15) { playerY = 15; isJumping = false; velocityY = 0; }
            }
            player.style.bottom = playerY + 'vh';

            gamePos += 3;
            gameContainer.style.backgroundPosition = `-${gamePos}px bottom`;
            
            document.querySelectorAll('.obstaculo, #princesa').forEach(element => {
                let left = parseInt(element.style.left || window.getComputedStyle(element).left) - 3;
                if(element.id === "princesa") {
                    let targetPos = window.innerWidth - 120;
                    if(gamePos < finalDaFase - 100) {
                        element.style.left = (window.innerWidth + (finalDaFase - gamePos) - 300) + 'px';
                    } else {
                        element.style.left = targetPos + 'px';
                        gameActive = false;
                        setTimeout(() => { document.getElementById('tela-desafio').style.display = 'flex'; }, 500);
                    }
                } else {
                    element.style.left = left + 'px';
                }
            });
            requestAnimationFrame(loop);
        }
    }

    function abrirPedido(event) {
        event.stopPropagation();
        document.getElementById('tela-desafio').style.display = 'none';
        document.getElementById('tela-pedido').style.display = 'flex';
        // Posiciona o botão não inicialmente ao lado do sim
        btnNaoFoge.style.left = 'calc(50% + 20px)';
        btnNaoFoge.style.top = '25px';
    }

    function fugir(event) {
        event.stopPropagation();
        btnNaoFoge.style.position = 'fixed';
        btnNaoFoge.style.left = Math.random() * (window.innerWidth - 120) + 'px';
        btnNaoFoge.style.top = Math.random() * (window.innerHeight - 120) + 'px';
    }

    function aceitou(event) {
        event.stopPropagation();
        document.getElementById('tela-pedido').style.display = 'none';
        document.getElementById('tela-celebracao').style.display = 'flex';
    }
</script>
</body>
</html>
